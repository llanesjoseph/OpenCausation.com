name: Deploy to Firebase Hosting

# Cloud-side auto-deploy on every push to main.
# Auth uses a keyless Firebase CI token (secret: FIREBASE_TOKEN) because the
# project's org policy blocks service-account key creation.

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project opencausation --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
